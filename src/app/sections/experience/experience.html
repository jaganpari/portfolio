<section class="experience">

    <div class="title">

        <h1>Experience</h1>

        <p>
            My professional journey building enterprise web applications.
        </p>

    </div>

    <div class="timeline">

        @for(exp of experiences(); track exp.period){

            <div class="timeline-item">

                <div class="dot"></div>

                <div class="content">

                    <span class="period">
                        {{exp.period}}
                    </span>

                    <h2>{{exp.title}}</h2>

                    <h3>{{exp.company}}</h3>

                    <p>{{exp.description}}</p>

                    <app-chips-component [technologies]="exp.technologies"></app-chips-component>

                </div>

            </div>

        }

    </div>

</section>
