<section class="skills">

    <div class="title">

        <h1>Technical Skills</h1>

        <p>
            Technologies I use to build enterprise applications.
        </p>

    </div>

    <div class="skills-grid">

        <div class="skill-card">

            <h2>Frontend Development</h2>

            @for(skill of frontendSkills(); track skill.name){

                <div class="skill">

                    <div class="skill-header">

                        <span>{{skill.name}}</span>

                        <span>{{skill.percentage | skillLevel}}</span>

                        <span>{{skill.percentage}}%</span>

                    </div>

                    <div class="progress">

                        <div
                            class="progress-bar"
                            [style.width.%]="skill.percentage"
                            [style.background]="skill.background">
                        </div>

                    </div>

                </div>

            }

        </div>

        <div class="tech-card">

            <h2>Technologies</h2>

            <app-chips-component [technologies]="technologies()"></app-chips-component>

        </div>

    </div>

</section>
