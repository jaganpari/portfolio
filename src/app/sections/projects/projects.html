<section class="projects">

    <div class="title">

        <h1>Featured Projects</h1>

        <p>
            A selection of enterprise applications and reusable solutions.
        </p>

    </div>

    <div class="project-grid">

        @for(project of projects(); track project.title){

            <div class="project-card">

                <h2>{{project.title}}</h2>

                <p>

                    {{project.description}}

                </p>

                <app-chips-component [technologies]="project.technologies"></app-chips-component>

            </div>

        }

    </div>

</section>
